name: "Repoxide Action"
description: "Pack repository contents into a single file that is easy for LLMs to process"
author: "Kazuki Yamada <koukun0120@gmail.com>"
branding:
  icon: archive
  color: orange

inputs:
  directories:
    description: "Space-separated list of directories to process (defaults to '.')"
    required: false
    default: "."
  include:
    description: "Comma-separated glob patterns to include"
    required: false
    default: ""
  ignore:
    description: "Comma-separated glob patterns to ignore"
    required: false
    default: ""
  output:
    description: "Relative path to write packed file"
    required: false
    default: "repoxide-output.xml"
  compress:
    description: "Set to 'false' to disable smart compression"
    required: false
    default: "true"
  style:
    description: "Output style (xml, markdown, plain)"
    required: false
    default: "xml"
  additional-args:
    description: "Any extra raw arguments to pass directly to the repoxide CLI"
    required: false
    default: ""
  repoxide-version:
    description: "Version (or tag) of the npm package to install. Use 'local' to build the bundled CLI source."
    required: false
    default: "local"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
      with:
        node-version: "24"
    - name: Setup Rust toolchain
      if: ${{ inputs.repoxide-version == 'local' }}
      uses: dtolnay/rust-toolchain@stable
    - name: Install project dependencies
      shell: bash
      run: |
        # Install project dependencies if package.json exists
        # This ensures repoxide.config.ts can import from local source
        if [ -f "package.json" ]; then
          npm install
        fi
    - name: Install Repoxide
      shell: bash
      run: |
        set -euo pipefail

        if [ "${{ inputs.repoxide-version }}" = "local" ]; then
          CLI_DIR="${{ github.action_path }}/../../../crates/repoxide"
          cargo install --path "$CLI_DIR" --force
        else
          npm install --global repoxide@${{ inputs.repoxide-version }}
        fi
    - name: Run Repoxide
      id: build
      shell: bash
      run: |
        set -e
        # Using an array for safer command execution
        # Safely split directories input into an array, handling spaces correctly
        IFS=' ' read -r -a ARGS <<< "${{ inputs.directories }}"

        if [ -n "${{ inputs.include }}" ]; then
          ARGS+=(--include "${{ inputs.include }}")
        fi

        if [ -n "${{ inputs.ignore }}" ]; then
          ARGS+=(--ignore "${{ inputs.ignore }}")
        fi

        if [ "${{ inputs.compress }}" = "true" ]; then
          ARGS+=(--compress)
        fi

        if [ -n "${{ inputs.style }}" ]; then
          ARGS+=(--style "${{ inputs.style }}")
        fi

        ARGS+=(--output "${{ inputs.output }}")

        # Only add additional args if not empty
        if [ -n "${{ inputs.additional-args }}" ]; then
          # Use safer parsing for additional arguments
          IFS=' ' read -r -a ADDITIONAL_ARGS <<< "${{ inputs.additional-args }}"
          ARGS+=("${ADDITIONAL_ARGS[@]}")
        fi

        echo "Running: repoxide ${ARGS[*]}"
        repoxide "${ARGS[@]}"

        echo "output_file=${{ inputs.output }}" >> "$GITHUB_OUTPUT"

outputs:
  output_file:
    description: "Path to the file generated by Repoxide"
    value: ${{ steps.build.outputs.output_file }}
