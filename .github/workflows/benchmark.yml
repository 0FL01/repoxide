name: Memory Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Number of test iterations (default: 50)'
        required: false
        default: '50'
      delay:
        description: 'Delay between iterations in ms (default: 50)'
        required: false
        default: '50'

jobs:
  memory-test:
    name: Memory Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: legacy/repomix-ts/scripts/memory
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: .tool-versions
          cache: npm
          cache-dependency-path: |
            legacy/repomix-ts/package-lock.json
            legacy/repomix-ts/scripts/memory/package-lock.json

      - name: Install legacy Repomix dependencies
        working-directory: legacy/repomix-ts
        run: npm ci

      - name: Build legacy Repomix
        working-directory: legacy/repomix-ts
        run: npm run build

      - name: Install benchmark dependencies
        run: npm ci

      - name: Build benchmark
        run: npm run build

      - name: Run memory test
        run: |
          ITERATIONS=${{ github.event.inputs.iterations || '50' }}
          DELAY=${{ github.event.inputs.delay || '50' }}
          node --expose-gc dist/memory-test.js $ITERATIONS $DELAY
        env:
          CI: true

      - name: Upload memory test results
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always()
        with:
          name: memory-test-results-${{ github.run_id }}
          path: legacy/repomix-ts/scripts/memory/memory-test-results-*.json
          retention-days: 30

  memory-test-full:
    name: Memory Test (Full Analysis)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: legacy/repomix-ts/scripts/memory
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: .tool-versions
          cache: npm
          cache-dependency-path: |
            legacy/repomix-ts/package-lock.json
            legacy/repomix-ts/scripts/memory/package-lock.json

      - name: Install legacy Repomix dependencies
        working-directory: legacy/repomix-ts
        run: npm ci

      - name: Build legacy Repomix
        working-directory: legacy/repomix-ts
        run: npm run build

      - name: Install benchmark dependencies
        run: npm ci

      - name: Build benchmark
        run: npm run build

      - name: Run comprehensive memory test
        run: node --expose-gc dist/memory-test.js --full --save
        env:
          CI: true

      - name: Upload detailed memory test results
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always()
        with:
          name: memory-test-results-full-${{ github.run_id }}
          path: legacy/repomix-ts/scripts/memory/memory-test-results-*.json
          retention-days: 90
