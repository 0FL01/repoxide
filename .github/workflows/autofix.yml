name: autofix.ci

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: .tool-versions
          cache: npm
          cache-dependency-path: |
            legacy/repoxide-ts/package-lock.json
            apps/web/client/package-lock.json
            legacy/website-server-ts/package-lock.json
            legacy/repoxide-ts/browser/package-lock.json

      - name: Install legacy TypeScript dependencies
        working-directory: legacy/repoxide-ts
        run: npm ci

      - name: Run biome with auto-fix
        working-directory: legacy/repoxide-ts
        run: npm run lint-biome
        continue-on-error: true

      - name: Run oxlint with auto-fix
        working-directory: legacy/repoxide-ts
        run: npm run lint-oxlint
        continue-on-error: true

      - name: Fix web client linting
        working-directory: apps/web/client
        run: |
          npm ci
          npm run lint
        continue-on-error: true

      - name: Fix legacy web server linting
        working-directory: legacy/website-server-ts
        run: |
          npm ci
          npm run lint
        continue-on-error: true

      - name: Fix browser extension linting
        working-directory: legacy/repoxide-ts/browser
        run: |
          npm ci
          npm run prepare
          npm run lint
        continue-on-error: true

      - uses: autofix-ci/action@635ffb0c9798bd160680f18fd73371e355b85f27 # v1.3.2
