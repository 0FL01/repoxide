name: Test Repoxide Action

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/actions/repoxide/**'

jobs:
  test-action:
    name: Test Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
        include:
          - node-version: 18
            test-case: "minimal"
          - node-version: 20
            test-case: "basic"
          - node-version: 22
            test-case: "full"
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Run Repoxide Action (Minimal)
        if: matrix['test-case'] == 'minimal'
        uses: ./.github/actions/repoxide
        with:
          output: "repoxide-minimal-output.txt"

      - name: Run Repoxide Action (Basic)
        if: matrix['test-case'] == 'basic'
        uses: ./.github/actions/repoxide
        with:
          directories: "crates/repoxide/src"
          include: "**/*.rs"
          output: "repoxide-basic-output.txt"
          compress: "true"

      - name: Run Repoxide Action (Full)
        if: matrix['test-case'] == 'full'
        uses: ./.github/actions/repoxide
        with:
          directories: "crates/repoxide/src apps/web/server/src"
          include: "**/*.rs,**/*.md"
          ignore: "**/target/**"
          output: "repoxide-full-output.txt"
          compress: "true"
          additional-args: "--no-file-summary"

      - name: Upload result
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: repoxide-output-node${{ matrix.node-version }}
          path: repoxide-*-output.txt
