services:
  client:
    build:
      context: ./apps/web/client
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    user: "${UID:-1000}:${GID:-1000}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    ports:
      - "127.0.0.1:93:5173"
    volumes:
      - ./apps/web/client:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run docs:dev -- --port 5173 --host 0.0.0.0
    mem_limit: 1g
    cpus: 2

  server:
    build:
      context: .
      dockerfile: apps/web/server/Dockerfile
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    # No ports exposed to the host!
    environment:
      - PORT=8080
      - RUST_LOG=repomix_server=debug,tower_http=debug
    mem_limit: 3g
    cpus: 3
