services:
  web:
    build:
      context: .
      dockerfile: apps/web/server/Dockerfile
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    ports:
      - "127.0.0.1:93:8080"
    environment:
      - PORT=8080
      - RUST_LOG=repoxide_server=debug,tower_http=debug
    mem_limit: 3g
    cpus: 3
