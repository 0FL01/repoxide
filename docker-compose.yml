services:
  restart: unless-stopped
  client:
    build:
      context: ./website/client
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:93:5173"
    volumes:
      - ./website/client:/app
    environment:
      - NODE_ENV=development
    command: sh -c "npm i && npm run docs:dev -- --port 5173 --host 0.0.0.0"
    mem_limit: 1g
    cpus: 2

  server:
    build:
      context: .
      dockerfile: website/server-rs/Dockerfile
    # No ports exposed to the host!
    volumes:
      - ./website/server-rs:/app
    environment:
      - PORT=8080
      - RUST_LOG=repomix_server=debug,tower_http=debug
    mem_limit: 3g
    cpus: 3
