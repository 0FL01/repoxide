steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/repomix-server-rs:$COMMIT_SHA', '-f', 'apps/web/server/Dockerfile', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/repomix-server-rs:$COMMIT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: ['run', 'deploy', 'repomix-server', '--image', 'gcr.io/$PROJECT_ID/repomix-server-rs:$COMMIT_SHA', '--region', 'us-central1']
